<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>挂啥科</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="chat-shell glass">
      <div id="chatViewport" class="chat-viewport">
        <div id="chatFeed" class="chat-feed"></div>
      </div>

      <div class="composer-wrap">
        <div id="quickRow" class="quick-row"></div>
        <div id="plusMenu" class="plus-menu hidden">
          <button class="plus-item" data-menu-action="report">
            <span class="plus-item-icon report">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4h7l4 4v12H7z"></path><path d="M14 4v4h4"></path><path d="M9 13h6"></path><path d="M9 17h4"></path></svg>
            </span>
            <span class="plus-item-label">检验报告</span>
          </button>
          <button class="plus-item" data-menu-action="image">
            <span class="plus-item-icon album">
              <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="14" rx="3"></rect><path d="M8 13l2.5-2.5 2.5 2.5 3-3 3 4"></path><circle cx="9" cy="9" r="1.2"></circle></svg>
            </span>
            <span class="plus-item-label">相册</span>
          </button>
          <button class="plus-item" data-menu-action="camera">
            <span class="plus-item-icon camera">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 8h2l1.2-2h3.6L15 8h2a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2Z"></path><circle cx="12" cy="13" r="3.2"></circle></svg>
            </span>
            <span class="plus-item-label">拍照</span>
          </button>
          <button class="plus-item" data-menu-action="records">
            <span class="plus-item-icon records">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 5h10a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z"></path><path d="M9 9h6"></path><path d="M9 13h6"></path><path d="M9 17h4"></path></svg>
            </span>
            <span class="plus-item-label">记录</span>
          </button>
        </div>
        <div class="composer">
          <button id="modeToggleBtn" class="icon-btn" aria-label="语音切换"></button>
          <div class="input-slot">
            <textarea
              id="composerInput"
              rows="1"
              placeholder=""
            ></textarea>
            <button id="voiceCaptureBtn" class="voice-capture hidden">按住说话</button>
          </div>
          <button id="plusBtn" class="icon-btn plus-btn" aria-label="更多功能"></button>
          <button id="sendBtn" class="send-btn">发送</button>
        </div>
        <p id="composerHint" class="composer-hint"></p>
      </div>
    </section>

    <dialog id="recordsDialog" class="records-dialog">
      <div class="dialog-head">
        <div>
          <h3>历史记录</h3>
          <p id="recordsSubcopy" class="dialog-subcopy">这里会保存你之前的总结、材料和导出记录。</p>
        </div>
        <button id="closeRecordsBtn" class="text-btn">关闭</button>
      </div>
      <div class="login-state-card">
        <div>
          <p class="login-state-label">当前账号</p>
          <p id="recordsLoginState" class="login-state-value">未登录</p>
        </div>
        <button id="recordsLoginBtn" class="record-action">微信登录</button>
      </div>
      <button id="listRecordsBtn" class="send-btn wide">刷新列表</button>
      <div id="recordsList" class="records-list"></div>
    </dialog>

    <dialog id="recordDetailDialog" class="records-dialog detail-dialog">
      <div class="dialog-head">
        <div>
          <h3>记录详情</h3>
          <p class="dialog-subcopy">查看这次建议、检查和已保存材料。</p>
        </div>
        <button id="closeRecordDetailBtn" class="text-btn">关闭</button>
      </div>
      <div id="recordDetailBody" class="record-detail-body"></div>
    </dialog>

    <dialog id="loginDialog" class="records-dialog login-dialog">
      <div class="dialog-head">
        <div>
          <h3>微信登录</h3>
          <p class="dialog-subcopy">先用微信登录后再保存和查看记录。正式上线后再补手机号验证码登录。</p>
        </div>
        <button id="closeLoginBtn" class="text-btn">关闭</button>
      </div>
      <div class="login-card">
        <div class="login-wechat-mark">
          <span class="login-wechat-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8.5 7.2c-3.2 0-5.8 2.2-5.8 5 0 1.6.8 3 2.2 4l-.6 2.4 2.5-1.3c.6.1 1.1.2 1.7.2 3.2 0 5.8-2.2 5.8-5s-2.6-5.3-5.8-5.3Z"></path><path d="M16.2 10.2c2.8 0 5 1.9 5 4.3 0 1.4-.8 2.6-2.1 3.4l.5 2-2-1.1c-.5.1-.9.1-1.4.1-2.8 0-5-1.9-5-4.4 0-2.3 2.2-4.3 5-4.3Z"></path><path d="M6.9 11.8h.01M10.2 11.8h.01M14.9 14h.01M17.4 14h.01"></path></svg>
          </span>
          <div>
            <p class="login-card-title">微信一键登录</p>
            <p class="login-card-copy">当前先使用演示登录流程，后续接入真实公众号网页授权。</p>
          </div>
        </div>
        <button id="wechatLoginBtn" class="send-btn wide">用微信登录</button>
      </div>
    </dialog>

    <input id="reportInput" class="hidden" type="file" accept="image/*,.pdf" />
    <input id="cameraInput" class="hidden" type="file" accept="image/*" capture="environment" />
    <input id="imageInput" class="hidden" type="file" accept="image/*" />
  </main>

  <script src="/app.js"></script>
</body>
</html>
