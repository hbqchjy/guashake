<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>挂啥科</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="chat-shell glass">
      <div id="chatViewport" class="chat-viewport">
        <div id="chatFeed" class="chat-feed"></div>
      </div>

      <div class="composer-wrap">
        <div id="quickRow" class="quick-row"></div>
        <div id="plusMenu" class="plus-menu hidden">
          <button class="plus-item" data-menu-action="report">检验报告</button>
          <button class="plus-item" data-menu-action="camera">拍照</button>
          <button class="plus-item" data-menu-action="file">文件</button>
          <button class="plus-item" data-menu-action="image">发送图片</button>
          <button class="plus-item" data-menu-action="location">我的位置</button>
        </div>
        <div class="composer">
          <button id="modeToggleBtn" class="icon-btn" aria-label="语音切换"></button>
          <div class="input-slot">
            <textarea
              id="composerInput"
              rows="1"
              placeholder="说症状，例如：心慌、头晕"
            ></textarea>
            <button id="voiceCaptureBtn" class="voice-capture hidden">按一下开始语音</button>
          </div>
          <button id="plusBtn" class="icon-btn plus-btn" aria-label="更多功能"></button>
          <button id="sendBtn" class="send-btn">发送</button>
        </div>
        <p id="composerHint" class="composer-hint">我会先问最必要的问题，不会一上来堆很多选项。</p>
      </div>
    </section>

    <dialog id="recordsDialog" class="records-dialog">
      <div class="dialog-head">
        <h3>历史记录</h3>
        <button id="closeRecordsBtn" class="text-btn">关闭</button>
      </div>
      <label class="dialog-label">
        用户ID（为空用 guest）
        <input id="userId" type="text" placeholder="wx_user_001" />
      </label>
      <button id="listRecordsBtn" class="send-btn wide">刷新列表</button>
      <div id="recordsList" class="records-list"></div>
    </dialog>

    <input id="reportInput" class="hidden" type="file" accept="image/*,.pdf" />
    <input id="cameraInput" class="hidden" type="file" accept="image/*" capture="environment" />
    <input id="imageInput" class="hidden" type="file" accept="image/*" />
    <input id="fileInput" class="hidden" type="file" />
  </main>

  <script src="/app.js"></script>
</body>
</html>
